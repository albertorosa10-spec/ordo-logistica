<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vincular NF-e - Zakaz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Vincular NF-e ao Agendamento #{{ agendamento.id }}</h4>
            </div>
            <div class="card-body">
                <p><strong>Fornecedor:</strong> {{ agendamento.fornecedor.razao_social }}</p>
                <p><strong>Prazo limite:</strong> <span class="text-danger">{{ prazo|date:"d/m/Y H:i" }}</span></p>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Chave da NF-e (44 dígitos)</label>
                        <input type="text" name="chave_nfe" class="form-control" placeholder="Dica: termine em 123 para validar" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Arquivo XML (Opcional)</label>
                        <input type="file" name="arquivo_xml" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Confirmar Agendamento</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
