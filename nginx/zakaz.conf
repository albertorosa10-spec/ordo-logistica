server {
    listen 8081;
    server_name 10.253.12.13;

    location /static/ {
        alias /home/agsimoes1/ordo-logistica/staticfiles/;
    }

    location /media/ {
        alias /home/agsimoes1/ordo-logistica/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
